apiVersion: apps/v1
kind: Deployment
metadata:
  name: temp-converter-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: temp-app

  template:
    metadata:
      labels:
        app: temp-app

    spec:
      containers:
      - name: temp-container
        image: dockerhub_username/temp-converter:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: temp-service

spec:
  type: NodePort

  selector:
    app: temp-app

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007